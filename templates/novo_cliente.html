{% extends "base.html" %}

{% block title %}Novo Cliente - Cobrança Inteligente{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header">
        <h2><i class="fas fa-user-plus"></i> Cadastrar Cliente</h2>
    </div>
    
    <form method="POST">
        <div class="form-group">
            <label for="nome"><i class="fas fa-user"></i> Nome completo</label>
            <input type="text" id="nome" name="nome" placeholder="Ex: João da Silva" required autofocus>
        </div>
        <div class="form-group">
            <label for="telefone"><i class="fas fa-phone"></i> Telefone / WhatsApp</label>
            <input type="text" id="telefone" name="telefone" placeholder="(11) 99999-9999" required>
        </div>
        <div class="form-group">
            <label for="carro"><i class="fas fa-car"></i> Veículo (modelo/placa)</label>
            <input type="text" id="carro" name="carro" placeholder="Ex: Gol G5 - ABC1234">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn"><i class="fas fa-save"></i> Salvar Cliente</button>
            <a href="{{ url_for('listar_clientes') }}" class="btn btn-outline"><i class="fas fa-times"></i> Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
